version: '3.8'

services:
  app:
    image: ${APP_IMAGE:-cfarm-ir-app:v1}
    container_name: cfarm_ir_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - cfarm_storage_data:/var/www/html/storage
    environment:
      APP_NAME: ${APP_NAME:-CFARM IR System}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:iZpDnX7tcAUX9QUJNXikuAxOSx93g94UEERNKOdJ3v4=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://webserver}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-cfarm_ir}
      DB_USERNAME: ${DB_USERNAME:-itadmin}
      DB_PASSWORD: ${DB_PASSWORD:-Noipalee@09}
    networks:
      - cfarm_network
    depends_on:
      - db

  webserver:
    image: ${WEBSERVER_IMAGE:-cfarm-ir-webserver:v1}
    container_name: cfarm_ir_webserver
    restart: unless-stopped
    ports:
      - "${APP_PORT:-2019}:80"
    volumes:
      - cfarm_storage_data:/var/www/html/storage
    networks:
      - cfarm_network
    depends_on:
      - app

  db:
    image: ${DB_IMAGE:-mysql:8.0}
    container_name: cfarm_ir_db
    restart: unless-stopped
    ports:
      - "${DB_PORT_FORWARD:-3308}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cfarm_ir}
      MYSQL_USER: ${DB_USERNAME:-itadmin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Noipalee@09}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Noipalee@09}
    volumes:
      - cfarm_db_data:/var/lib/mysql
    networks:
      - cfarm_network

  scheduler:
    image: ${APP_IMAGE:-cfarm-ir-app:v1}
    container_name: cfarm_ir_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    environment:
      APP_NAME: ${APP_NAME:-CFARM IR System}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-base64:iZpDnX7tcAUX9QUJNXikuAxOSx93g94UEERNKOdJ3v4=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://webserver}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-cfarm_ir}
      DB_USERNAME: ${DB_USERNAME:-itadmin}
      DB_PASSWORD: ${DB_PASSWORD:-Noipalee@09}
    networks:
      - cfarm_network
    depends_on:
      - app
      - db

networks:
  cfarm_network:
    driver: bridge

volumes:
  cfarm_storage_data:
  cfarm_db_data:
