version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: cfarm_ir_app
    container_name: cfarm_ir_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - cfarm_network

  nginx:
    image: nginx:alpine
    container_name: cfarm_ir_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cfarm_network

  mysql:
    image: mysql:8.0
    container_name: cfarm_ir_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cfarm_ir}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      MYSQL_USER: ${DB_USERNAME:-itadmin}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "${DB_PORT:-3308}:3306"
    volumes:
      - cfarm_mysql_data:/var/lib/mysql
    networks:
      - cfarm_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cfarm_ir_phpmyadmin
    profiles: ["debug"]
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-itadmin}
      PMA_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - cfarm_network

networks:
  cfarm_network:
    driver: bridge

volumes:
  cfarm_mysql_data:
